name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke-test experiment pipeline
        run: |
          python src/kv_cache_tier/eviction/train_predictors.py
          python benchmarks/experiment_runner.py --duration 0.02 --seeds 1
        env:
          MPLBACKEND: Agg
